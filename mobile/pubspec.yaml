name: neon_arena
description: NeonArena — Esports Tournament Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  supabase_flutter: ^2.5.0
  google_sign_in: ^6.2.1
  flutter_dotenv: ^5.1.0
  image_picker: ^1.1.0
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
    - assets/images/
